services:
  - type: web
    name: deal-finder-bot
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18.19.0
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
      - key: TZ
        value: Asia/Kolkata
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: AMAZON_AFFILIATE_TAG
        sync: false
      - key: FLIPKART_AFFILIATE_ID
        sync: false
      - key: MYNTRA_AFFILIATE_ID
        sync: false
